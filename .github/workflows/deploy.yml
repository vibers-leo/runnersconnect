name: Deploy to NCP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to NCP server
        env:
          SSH_KEY: ${{ secrets.NCP_SSH_KEY }}
          HOST: ${{ secrets.NCP_HOST }}
          USER: ${{ secrets.NCP_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=10 \
            -p 22 \
            $USER@$HOST \
            "cd /root/projects/runnersconnect/backend && git pull origin main && docker compose build --no-cache && docker compose up -d && docker compose ps"
          rm -f /tmp/deploy_key
