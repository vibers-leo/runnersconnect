name: Deploy to NCP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.NCP_SSH_KEY }}

      - name: Deploy to NCP server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.NCP_USER }}@${{ secrets.NCP_HOST }} \
            "cd /root/projects/runnersconnect/backend && \
             git checkout -- . && \
             git pull origin main && \
             docker compose up -d --build --no-deps && \
             sleep 15 && \
             docker compose exec -T runnersconnect-api bin/rails db:migrate 2>/dev/null; \
             sleep 10 && \
             curl -sf http://localhost:4070/up && echo '✅ RunnersConnect 배포 완료' || echo '⚠️ 헬스체크 실패' && \
             docker exec npm-app-1 nginx -s reload || true"

      - name: Cleanup old images
        if: success()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.NCP_HOST }}
          username: ${{ secrets.NCP_USER }}
          key: ${{ secrets.NCP_SSH_KEY }}
          script: |
            docker image prune -af --filter "until=24h"
            docker builder prune -af --filter "until=24h"
