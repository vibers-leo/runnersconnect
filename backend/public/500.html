<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>서버 오류 | Runner's Connect</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', sans-serif; background: #f9fafb; color: #111827; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .container { text-align: center; padding: 2rem; max-width: 28rem; }
    .code { font-size: 5rem; font-weight: 800; color: #ef4444; line-height: 1; }
    h1 { font-size: 1.5rem; font-weight: 700; margin: 1rem 0 0.5rem; }
    p { color: #6b7280; font-size: 0.938rem; line-height: 1.6; }
    .btn { display: inline-block; margin-top: 1.5rem; padding: 0.75rem 2rem; background: #2563eb; color: #fff; border-radius: 0.75rem; text-decoration: none; font-weight: 700; }
    .btn:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">500</div>
    <h1>일시적인 오류가 발생했습니다</h1>
    <p>잠시 후 다시 시도해주세요.</p>
    <a href="/" class="btn">홈으로 돌아가기</a>
  </div>
</body>
</html>
